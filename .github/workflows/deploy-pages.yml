name: Deploy Site to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "humanoid-policy-viewer/package-lock.json"

      - name: Install viewer dependencies
        run: npm ci
        working-directory: humanoid-policy-viewer

      - name: Build embedded humanoid-policy-viewer
        run: npm run build
        working-directory: humanoid-policy-viewer

      - name: Verify viewer build output
        run: |
          test -f static/humanoid-policy-viewer/index.html || { echo "ERROR: humanoid-policy-viewer build output missing"; exit 1; }

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp -R static _site/static
          cp -R lessmimic-live-demo-assets _site/lessmimic-live-demo-assets
          [ ! -f sw.js ] || cp sw.js _site/sw.js
          [ ! -f CNAME ] || cp CNAME _site/CNAME
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
