name: Deploy Site to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "humanoid-policy-viewer/package-lock.json"

      - name: Install viewer dependencies
        run: npm ci
        working-directory: humanoid-policy-viewer

      - name: Build embedded humanoid-policy-viewer
        run: npm run build
        working-directory: humanoid-policy-viewer

      - name: Prepare Pages artifact
        run: mkdir -p _site && cp index.html _site/index.html && cp -R static _site/static && if [ -f .nojekyll ]; then cp .nojekyll _site/.nojekyll; fi && if [ -f CNAME ]; then cp CNAME _site/CNAME; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
